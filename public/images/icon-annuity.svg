<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="circleGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="goldGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="38" r="30" fill="#f0f5ff" stroke="url(#circleGrad3)" stroke-width="1.5"/>
  <!-- Growth chart / coin stack -->
  <g transform="translate(40, 40)">
    <!-- Coin stack -->
    <ellipse cx="-8" cy="6" rx="10" ry="3.5" fill="url(#goldGrad3)" opacity="0.3"/>
    <ellipse cx="-8" cy="3" rx="10" ry="3.5" fill="url(#goldGrad3)" opacity="0.6"/>
    <ellipse cx="-8" cy="0" rx="10" ry="3.5" fill="url(#goldGrad3)" opacity="0.9"/>
    <!-- Dollar sign -->
    <text x="-8" y="3" font-family="'Inter', system-ui, sans-serif" font-size="7" font-weight="700" fill="white" text-anchor="middle">$</text>
    <!-- Growth arrow -->
    <path d="M-2-4l6-8 8 3 6-10" stroke="url(#circleGrad3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Arrow up accent -->
    <path d="M18-19l5 1-1 5" stroke="url(#circleGrad3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <circle cx="40" cy="72" r="2.5" fill="url(#goldGrad3)"/>
</svg>