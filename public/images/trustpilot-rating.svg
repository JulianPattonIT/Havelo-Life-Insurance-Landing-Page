<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" fill="none">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#E0B959"/>
    </linearGradient>
  </defs>
  <!-- 5 stars -->
  <g transform="translate(0, 10)">
    <!-- Star 1 -->
    <polygon points="10,0 12.5,7 20,7 14,11.5 16,19 10,14 4,19 6,11.5 0,7 7.5,7" fill="url(#starGrad)"/>
    <!-- Star 2 -->
    <polygon points="32,0 34.5,7 42,7 36,11.5 38,19 32,14 26,19 28,11.5 22,7 29.5,7" fill="url(#starGrad)"/>
    <!-- Star 3 -->
    <polygon points="54,0 56.5,7 64,7 58,11.5 60,19 54,14 48,19 50,11.5 44,7 51.5,7" fill="url(#starGrad)"/>
    <!-- Star 4 -->
    <polygon points="76,0 78.5,7 86,7 80,11.5 82,19 76,14 70,19 72,11.5 66,7 73.5,7" fill="url(#starGrad)"/>
    <!-- Star 5 (half-filled style but full) -->
    <polygon points="98,0 100.5,7 108,7 102,11.5 104,19 98,14 92,19 94,11.5 88,7 95.5,7" fill="url(#starGrad)"/>
  </g>
  <!-- Rating text -->
  <text x="120" y="24" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">Rated</text>
  <text x="162" y="24" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#1B2A4A">4.5</text>
  <text x="180" y="24" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">/ 5 on</text>
  <!-- Trustpilot text -->
  <text x="18" y="36" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="700" fill="#00B67A" letter-spacing="1">Trustpilot</text>
  <!-- Small green circle -->
  <circle cx="9" cy="33" r="3" fill="#00B67A"/>
</svg>