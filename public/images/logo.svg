  <text x="60" y="42" font-family="'Montserrat', 'Inter', system-ui, sans-serif" font-size="42" font-weight="800" fill="#1B2A4A" letter-spacing="-1">Havelo</text>
  <!-- Tagline -->
  <text x="62" y="62" font-family="'Montserrat', 'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#64748B" letter-spacing="1.5">Real coverage, made simple</text>
</svg>