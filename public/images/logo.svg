    <!-- Gold star -->
    <polygon points="0,-17 1.5,-13 6,-13 2.5,-10 4,-5.5 0,-8 -4,-5.5 -2.5,-10 -6,-13 -1.5,-13" fill="url(#goldAccent)"/>
