<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Circle -->
  <circle cx="40" cy="38" r="30" fill="#f0f5ff" stroke="url(#circleGrad)" stroke-width="1.5"/>
  <!-- Dove of peace -->
  <g transform="translate(40, 36)">
    <!-- Dove body -->
    <path d="M-10 8c0-7 5-12 10-16 5 4 10 9 10 16 0 5-4 8-10 8s-10-3-10-8z" fill="url(#circleGrad)" opacity="0.85"/>
    <!-- Wing detail -->
    <path d="M0-4c-3-3-12-1-14 5-1-3-1-8 3-12" fill="url(#circleGrad)" opacity="0.6"/>
    <!-- Olive branch -->
    <path d="M-5 4l-3-1.5" stroke="#4ade80" stroke-width="1.2" stroke-linecap="round"/>
    <ellipse cx="-8" cy="1" rx="1.8" ry="0.8" fill="#4ade80"/>
    <ellipse cx="-10" cy="2.5" rx="1.8" ry="0.8" fill="#4ade80"/>
  </g>
  <!-- Gold accent dot -->
  <circle cx="40" cy="72" r="2.5" fill="url(#goldGrad)"/>
</svg>